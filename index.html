<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw 業務全体マップ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0b0c10;
  --bg2: #13141a;
  --bg3: #1a1b24;
  --border: rgba(255,255,255,0.07);
  --border-hover: rgba(255,255,255,0.18);
  --text: #e2e0ec;
  --muted: #777;
  --dim: #444;

  --teal:   #1ec99a;
  --teal-d: #0d5c47;
  --teal-bg:#071f17;
  --coral:  #f07f5a;
  --coral-d:#7a3318;
  --coral-bg:#2a1208;
  --purple: #9b87f5;
  --purple-d:#3c2e8a;
  --purple-bg:#12103a;
  --amber:  #f5c842;
  --amber-d:#7a5e08;
  --amber-bg:#221a02;
  --blue:   #5aaeef;
  --blue-d: #1a4d7a;
  --blue-bg:#081828;
  --pink:   #e878b8;
  --pink-d: #722060;
  --pink-bg:#250f20;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
  min-height: 100vh;
  padding: 32px 16px 64px;
}

/* ── Header ── */
.header {
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: #fff;
}
.header p {
  font-size: 13px;
  color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.04em;
}
.legend {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px 20px;
  margin-top: 18px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: #999;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ── Filter bar ── */
.filter-bar {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  margin-bottom: 32px;
}
.filter-btn {
  padding: 5px 16px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--muted);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.18s;
  font-family: inherit;
}
.filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
.filter-btn.active { color: #fff; border-color: transparent; }
.filter-btn[data-cat="all"].active    { background: #333; }
.filter-btn[data-cat="strategy"].active  { background: var(--purple-d); border-color: var(--purple); color: var(--purple); }
.filter-btn[data-cat="content"].active   { background: var(--teal-d);   border-color: var(--teal);   color: var(--teal); }
.filter-btn[data-cat="operation"].active { background: var(--coral-d);  border-color: var(--coral);  color: var(--coral); }
.filter-btn[data-cat="analytics"].active { background: var(--blue-d);   border-color: var(--blue);   color: var(--blue); }
.filter-btn[data-cat="client"].active    { background: var(--amber-d);  border-color: var(--amber);  color: var(--amber); }
.filter-btn[data-cat="backoffice"].active{ background: var(--pink-d);   border-color: var(--pink);   color: var(--pink); }

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 16px;
  max-width: 1200px;
  margin: 0 auto;
}

/* ── Section card ── */
.section-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  transition: opacity 0.25s;
}
.section-card.dimmed { opacity: 0.15; pointer-events: none; }

.section-header {
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.section-icon {
  font-size: 18px;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  flex-shrink: 0;
}
.section-title {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.section-sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}

/* ── Task items ── */
.task-list { padding: 10px 10px 12px; }

.task {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  position: relative;
}
.task:hover { background: rgba(255,255,255,0.04); }
.task-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 6px;
}
.task-body { flex: 1; min-width: 0; }
.task-name {
  font-size: 13px;
  color: var(--text);
  line-height: 1.4;
}
.task-detail {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
  line-height: 1.5;
}
.task-badge {
  font-size: 10px;
  padding: 1px 7px;
  border-radius: 99px;
  flex-shrink: 0;
  margin-top: 3px;
  font-weight: 600;
  letter-spacing: 0.03em;
}
.badge-auto   { background: rgba(30,201,154,0.15); color: var(--teal); }
.badge-semi   { background: rgba(245,200,66,0.12);  color: var(--amber); }
.badge-manual { background: rgba(255,255,255,0.06); color: #666; }

/* ── Drawer / Detail panel ── */
.drawer-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.drawer-overlay.open { opacity: 1; pointer-events: all; }

.drawer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--bg3);
  border-top: 1px solid rgba(255,255,255,0.1);
  border-radius: 18px 18px 0 0;
  padding: 24px 24px 40px;
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.28s cubic-bezier(0.22,1,0.36,1);
  max-height: 85vh;
  overflow-y: auto;
}
.drawer.open { transform: translateY(0); }
.drawer-handle {
  width: 36px; height: 4px;
  background: #333;
  border-radius: 99px;
  margin: 0 auto 20px;
}
.drawer-tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 10px;
  border-radius: 99px;
  margin-bottom: 10px;
  font-weight: 600;
}
.drawer-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 6px;
}
.drawer-desc {
  font-size: 14px;
  color: #aaa;
  line-height: 1.7;
  margin-bottom: 20px;
}
.drawer-section { margin-bottom: 18px; }
.drawer-section h3 {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.prompt-box {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 13px;
  color: #ccc;
  line-height: 1.6;
  font-family: 'SF Mono', 'Menlo', monospace;
  white-space: pre-wrap;
  word-break: break-all;
}
.step-list { list-style: none; counter-reset: step; }
.step-list li {
  counter-increment: step;
  display: flex;
  gap: 10px;
  padding: 6px 0;
  font-size: 13px;
  color: #bbb;
  line-height: 1.5;
}
.step-list li::before {
  content: counter(step);
  min-width: 20px; height: 20px;
  border-radius: 50%;
  background: #222;
  color: #777;
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  margin-top: 1px;
}
.automation-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}
.automation-bar-label { font-size: 12px; color: var(--muted); width: 80px; flex-shrink: 0; }
.bar-track {
  flex: 1;
  height: 6px;
  background: #222;
  border-radius: 99px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 99px;
  transition: width 0.4s cubic-bezier(0.22,1,0.36,1);
}
.drawer-close {
  position: absolute;
  top: 20px; right: 20px;
  background: #222;
  border: none;
  border-radius: 50%;
  width: 32px; height: 32px;
  cursor: pointer;
  color: #777;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
}
.drawer-close:hover { background: #333; color: #fff; }

/* Count badge on header */
.count-badge {
  margin-left: auto;
  font-size: 11px;
  background: rgba(255,255,255,0.06);
  border-radius: 99px;
  padding: 2px 9px;
  color: var(--muted);
}

/* Responsive */
@media (min-width: 900px) {
  .drawer {
    left: auto; right: 0;
    top: 0; bottom: 0;
    width: 460px;
    border-radius: 0;
    border-left: 1px solid rgba(255,255,255,0.1);
    border-top: none;
    transform: translateX(100%);
    max-height: 100vh;
  }
  .drawer.open { transform: translateX(0); }
}
</style>
</head>
<body>

<div class="header">

  <div class="legend">

    <div class="legend-item"><div class="legend-dot" style="background:var(--amber)"></div>半自動（確認あり）</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--dim)"></div>補助・ドラフト生成</div>

<div class="grid" id="grid"></div>

<div class="drawer-overlay" id="overlay"></div>
<div class="drawer" id="drawer">
  <div class="drawer-handle"></div>

// Render
const grid = document.getElementById('grid');

DATA.forEach(section => {
  const cat = CATS[section.cat];
  const card = document.createElement('div');
  card.className = 'section-card';
  card.dataset.cat = section.cat;

  const levelCount = { auto: 0, semi: 0, assist: 0 };
  section.tasks.forEach(t => levelCount[t.level]++);

  card.innerHTML = `
    <div class="section-header">
      <div class="section-icon" style="background:${cat.bg}; font-size:16px">${cat.icon}</div>
      <div>
        <div class="section-title" style="color:${cat.color}">${section.section}</div>
        <div class="section-sub">${cat.label}</div>
      </div>
      <div class="count-badge">${section.tasks.length}件</div>
    </div>
    <div class="task-list">
      ${section.tasks.map((t, i) => `
        <div class="task" data-section="${section.section}" data-idx="${i}" data-cat="${section.cat}">
          <div class="task-dot" style="background:${t.level==='auto'?'var(--teal)':t.level==='semi'?'var(--amber)':'var(--dim)'}"></div>
          <div class="task-body">
            <div class="task-name">${t.name}</div>
            <div class="task-detail">${t.detail}</div>
          </div>
          <div class="task-badge ${t.level==='auto'?'badge-auto':t.level==='semi'?'badge-semi':'badge-manual'}">${t.level==='auto'?'全自動':t.level==='semi'?'半自動':'補助'}</div>
        </div>
      `).join('')}
    </div>
  `;
  grid.appendChild(card);
});

const drawerClose = document.getElementById('drawerClose');

function openDrawer(sectionName, idx, catKey) {
  const sec = DATA.find(s => s.section === sectionName);
  const task = sec.tasks[idx];
  const cat = CATS[catKey];

  drawerContent.innerHTML = `
    <div class="drawer-tag" style="background:${cat.bg};color:${cat.color}">${cat.icon} ${cat.label}</div>
    <div class="drawer-title">${task.name}</div>
    <div class="drawer-desc">${task.desc}</div>

    <div class="drawer-section">
      <h3>自動化レベル</h3>
      <div style="margin-top:8px">
        <div class="automation-bar">
          <div class="automation-bar-label">AI実行</div>
          <div class="bar-track"><div class="bar-fill" style="width:${task.auto}%;background:var(--teal)"></div></div>
          <div style="font-size:12px;color:var(--teal);min-width:36px;text-align:right">${task.auto}%</div>
        </div>
        <div class="automation-bar" style="margin-top:6px">
          <div class="automation-bar-label">人間確認</div>
          <div class="bar-track"><div class="bar-fill" style="width:${task.human}%;background:var(--amber)"></div></div>
          <div style="font-size:12px;color:var(--amber);min-width:36px;text-align:right">${task.human}%</div>
        </div>
      </div>
    </div>

    <div class="drawer-section">
      <h3>OpenClawへの指示例</h3>
      <div class="prompt-box">${task.prompt}</div>
    </div>

    <div class="drawer-section">
      <h3>自動化の流れ</h3>
      <ol class="step-list">
        ${task.steps.map(s => `<li>${s}</li>`).join('')}
      </ol>
    </div>
  `;

  overlay.classList.add('open');
  drawer.classList.add('open');
}

function closeDrawer() {
  overlay.classList.remove('open');
  drawer.classList.remove('open');
}

document.querySelectorAll('.task').forEach(el => {
  el.addEventListener('click', () => {
    openDrawer(el.dataset.section, parseInt(el.dataset.idx), el.dataset.cat);
  });
});

overlay.addEventListener('click', closeDrawer);
drawerClose.addEventListener('click', closeDrawer);

// Filter
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    document.querySelectorAll('.section-card').forEach(card => {
      if (cat === 'all' || card.dataset.cat === cat) {
        card.classList.remove('dimmed');
      } else {
        card.classList.add('dimmed');
      }
    });
  });
});
</script>
</body>
</html>
